name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build moodline-os
        working-directory: moodline-os
        run: |
          npm ci
          npm run build
        env:
          NODE_ENV: production

      - name: Build affective-slider
        working-directory: affective-slider
        run: |
          npm ci
          npm run build:static
        env:
          NODE_ENV: production

      - name: Stage for Pages
        run: |
          mkdir -p /tmp/pages/moodline-os
          cp -r moodline-os/dist/. /tmp/pages/moodline-os/
          mkdir -p /tmp/pages/affective-slider
          cp -r affective-slider/build/. /tmp/pages/affective-slider/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
