<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2B6CB0" />
    <title>MoodLine-OS — Mood Assessment</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #F8F9FA;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #1A202C;
        -webkit-text-size-adjust: 100%;
        overflow: hidden;
      }
      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="app" role="main" aria-live="polite" aria-atomic="true"></div>
    <link rel="preload" href="faces/neutral.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/afraid.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/confused.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/sad.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/angry.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/tired.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/tense.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/happy.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="faces/energetic.svg" as="image" type="image/svg+xml" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
